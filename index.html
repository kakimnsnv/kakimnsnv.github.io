<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Zhibek/assets/style.css">
    <title>Pepero</title>
</head>
<body>
    <div class="content">
        <div class="header">
            <div style="display: flex; align-items: center;">
                <img src="/Zhibek/assets/logo.jpg" alt="Logo" id="logo">
                <h1 style="margin-left: 20px;">Pepero - ресторан корейской еды</h1>
            </div>
            <div class="menu">
                <button class="tablink" onclick="openPage('Home', this, 'red')">ГЛАВНОЕ</button>
                <button class="tablink" onclick="openPage('News', this, 'red')" id="defaultOpen">МЕНЮ</button>
                <button class="tablink" onclick="openPage('Contact', this, 'red')">КОНТАКТЫ</button>
                <button class="tablink" onclick="openPage('About', this, 'red')">О НАС</button>
            </div>
        </div>
        <div class="main">
            <div id="Home" class="tabcontent">
                <h3>Главное чтото</h3>
                <p>блалблабалбалаблабалаба</p>
            </div>
            <div id="News" class="tabcontent">
                <h3>News</h3>
                <p>Some news this fine day!</p> 
            </div>
            <div id="Contact" class="tabcontent">
                <h3>Contact</h3>
                <p>Get in touch, or swing by for a cup of coffee.</p>
            </div>
            <div id="About" class="tabcontent">
                <h3>About</h3>
                <p>Who we are and what we do.</p>
            </div>
        </div>
        <div class="footer">
            
        </div>
    </div>
    </body>
    <script>
        function openPage(pageName, elmnt, color) {
        // Hide all elements with class="tabcontent" by default */
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tabcontent");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
        }

        // Remove the background color of all tablinks/buttons
        tablinks = document.getElementsByClassName("tablink");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].style.color = "";
        }

        // Show the specific tab content
        document.getElementById(pageName).style.display = "block";

        // Add the specific color to the button used to open the tab content
        elmnt.style.color = color;
        }

        // Get the element with id="defaultOpen" and click on it
        document.getElementById("defaultOpen").click();
    </script>
</html>
